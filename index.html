<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compound Interest Calculator</title>

    <!-- CSS File -->
    <link rel="stylesheet" href="style.css">

    <!-- JavaScript File -->
    <script src="script.js" defer></script>
</head>
<body>

    <div class="container">
        <h1>Compound Interest Calculator</h1>

        <div class="card">
            <p><strong>Principal (P):</strong> 40000</p>
            <p><strong>Rate (r):</strong> 10%</p>
            <p><strong>Time (t):</strong> 3 Years</p>
            <p><strong>Compounded:</strong> 1 Time Per Year</p>

            <p class="note">
                Open the browser console (F12 → Console) to view the calculated result.
            </p>
        </div>
    </div>

</body>
</html>
